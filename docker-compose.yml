services:
  security-hub:
    build:
      context: ./hub
    container_name: openclaw-security-hub
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env
    volumes:
      - /var/log/auth.log:/host/auth.log:ro
      - /proc:/host-proc:ro
      - /:/host-root:ro
      - /home/kyonccw/.openclaw/workspace/security-alerts:/openclaw/security-alerts
      - /home/kyonccw/.openclaw/workspace/dashboard:/openclaw/dashboard
    healthcheck:
      test: ["CMD", "python", "-c", "import os, urllib.request; urllib.request.urlopen(f'http://{os.environ.get(\"TAILSCALE_IP\", \"127.0.0.1\")}:{os.environ.get(\"SECURITY_HUB_PORT\", \"8099\")}/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
